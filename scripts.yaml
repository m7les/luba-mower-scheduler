mow_main:
  alias: Mow Main Area
  sequence:
  - target:
      entity_id: input_datetime.main_last_mow_3
    data:
      datetime: '{{ states(''input_datetime.main_last_mow_2'') }}'
    action: input_datetime.set_datetime
  - target:
      entity_id: input_datetime.main_last_mow_2
    data:
      datetime: '{{ states(''input_datetime.main_last_mow_1'') }}'
    action: input_datetime.set_datetime
  - target:
      entity_id: input_datetime.main_last_mow_1
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    action: input_datetime.set_datetime
  - action: mammotion.start_mow
    target:
      entity_id: lawn_mower.labby
    data:
      speed: 0.2
      ultra_wave: '1'
      channel_mode: 0
      rain_tactics: 1
      blade_height: 50
      toward_mode: 0
      border_mode: 0
      obstacle_laps: 0
      areas:
      - switch.labby_area_main
      start_progress: 0
      toward: -90
      is_mow: true
      is_dump: false
      mowing_laps: 1
      channel_width: 10
  - target:
      entity_id: input_datetime.main_next_time
    data:
      datetime: '{% if is_state(''input_select.main_schedule'', ''once per week'')
        %} {{ (now() + timedelta(days=7)).strftime(''%Y-%m-%d %H:%M:%S'') }} {% elif
        is_state(''input_select.main_schedule'', ''twice per week'') %} {{ (now()
        + timedelta(days=3)).strftime(''%Y-%m-%d %H:%M:%S'') }} {% else %} {{ now().strftime(''%Y-%m-%d
        %H:%M:%S'') }} {% endif %}'
    action: input_datetime.set_datetime
  description: ''
  icon: mdi:robot-mower
blade_maintenance_done:
  alias: Blade Maintenance Done
  sequence:
  - target:
      entity_id: input_select.blade_maintenance_stage
    data:
      cycle: true
    action: input_select.select_next
  - data:
      entity_id: input_number.blade_maintenance_tasktime_saved
      value: '{{ states(''sensor.labby_task_duration'') | float(0) }}'
    action: input_number.set_value
  mode: single
